name: prepare-release.yml

on:
  workflow_call:
    inputs:
      cliff_config:
        type: string
        description: "Path or URL to a git-cliff configuration file"
        required: true
      force_version:
        type: string
        description: "Specify the semver version for the next release, to override the default semver bump"
        default: ""
        required: false
      skip_semver_checks:
        type: boolean
        description: "Whether to skip semver checks when preparing the release"
        default: false
        required: false
      extra_release_util_args:
        type: string
        description: "Additional arguments to pass to the holochain_release_util prepare command"
        default: ""
        required: false
      setup_script:
        type: string
        description: |
          Optional bash script run on the runner after checkout and before
          any of the release tooling is installed or invoked. Use this hook
          to install system tools (compilers, toolchains, libraries) or
          export environment variables that crates being prepared need at
          build time. For example, a workspace containing a crate that
          links against `llvm-sys` can use this to download an LLVM
          toolchain and export `LLVM_SYS_*_PREFIX` so that
          `cargo-semver-checks` can build all features successfully.

          Anything written to `$GITHUB_ENV` from this script is available
          to subsequent steps in the job, including the `Prepare release`
          step.
        default: ""
        required: false
    secrets:
        HRA2_GITHUB_TOKEN:
          description: "GitHub token for Holochain Release Automation"
          required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run setup script
        if: ${{ inputs.setup_script != '' }}
        shell: bash
        run: ${{ inputs.setup_script }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.12.0

      - name: Install cargo-workspaces
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-workspaces@0.4.2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        if: ${{ !inputs.skip_semver_checks }}
        with:
          tool: cargo-semver-checks@0.46.0

      # For testing a new version of the holochain_release_util, you can uncomment the following lines:
      # The next step will have to be commented out to avoid replacing this version.
      # - name: Install holochain_release_util
      #   run: cargo install --git https://github.com/holochain/release-integration.git holochain_release_util

      - name: Install holochain_release_util
        uses: taiki-e/install-action@v2
        with:
          tool: holochain_release_util@0.1.5

      - name: Prepare release
        run: |
          # Check whether skipping semver checks was requested, and if so, generate the CLI flag
            if [ "${{ inputs.skip_semver_checks }}" = "true" ]; then
                SKIP_SEMVER_CHECKS_FLAG="--skip-semver-checks"
            else
                SKIP_SEMVER_CHECKS_FLAG=""
            fi
          
          holochain_release_util prepare --cliff-config "${{ inputs.cliff_config }}" \
            --force-version "${{ inputs.force_version }}" $SKIP_SEMVER_CHECKS_FLAG ${{ inputs.extra_release_util_args }}

      - name: Create a release pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.HRA2_GITHUB_TOKEN }}
          author: '${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>'
          committer: "Holochain Release Automation <hra+gh@holochain.org>"
          title: "Prepare next release"
          commit-message: "chore: Prepare next release"
          branch: "prepare-release"
          branch-suffix: "short-commit-hash"
          labels: "hra-release"
          team-reviewers: "holochain/holochain-devs"
          body: "Automated preparation for the next release, triggered by ${{ github.actor }}."
